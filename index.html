<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HexWanderer — 六边形浪游者</title>
  <link rel="icon" type="image/png" href="assets/ui/logo.png">
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#1a1a2e; color:#eee; font-family:-apple-system,BlinkMacSystemFont,sans-serif; }
    #game-container { width:100%; height:100%; position:relative; }
    #loading-screen {
      position:fixed; inset:0; z-index:9999;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:#1a1a2e;
    }
    .load-title { font-size:20px; font-weight:bold; margin-bottom:24px; letter-spacing:2px; }
    .load-track {
      display:flex; align-items:flex-end; gap:2px;
      position:relative; height:44px;
    }
    .load-tile {
      width:40px; height:40px; border-radius:4px; position:relative;
      background-size:contain; background-position:center; background-repeat:no-repeat;
      image-rendering:pixelated;
    }
    .load-tile.empty { background:#222; border:1px dashed #444; }
    .load-player {
      position:absolute; bottom:4px;
      width:32px; height:32px;
      background:url('assets/ui/player.png') center/contain no-repeat;
      transition: left 0.4s ease-out;
      z-index:2;
    }
    .load-status { font-size:12px; color:#888; margin-top:16px; }
    .load-pct { font-size:11px; color:#4fc3f7; margin-top:4px; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="load-title">HexWanderer</div>
    <div class="load-track" id="load-track">
      <!-- 13 tiles: empty + 11 terrains + portal -->
    </div>
    <div id="loading-text" class="load-status">加载中...</div>
    <div id="loading-pct" class="load-pct">0%</div>
  </div>
  <div id="game-container"></div>

  <script>
    // Build the 13-tile loading track
    const TILES = [
      { src: 'assets/terrain/grass.png', label: '草地' },
      { src: 'assets/terrain/desert.png', label: '荒漠' },
      { src: 'assets/terrain/water.png', label: '水域' },
      { src: 'assets/terrain/forest.png', label: '森林' },
      { src: 'assets/terrain/swamp.png', label: '沼泽' },
      { src: 'assets/terrain/lava.png', label: '熔岩' },
      { src: 'assets/terrain/ice.png', label: '浮冰' },
      { src: 'assets/terrain/desert_snow.png', label: '雪漠' },
      { src: 'assets/terrain/grass_snow.png', label: '雪原' },
      { src: 'assets/terrain/forest_snow.png', label: '雪林' },
      { src: 'assets/terrain/forest_deep.png', label: '密林' },
      { src: 'assets/building/portal.png', label: '传送门' },
    ];

    const track = document.getElementById('load-track');
    TILES.forEach((t, i) => {
      const el = document.createElement('div');
      el.className = 'load-tile' + (t.src ? '' : ' empty');
      if (t.src) el.style.backgroundImage = `url('${t.src}')`;
      el.title = t.label;
      track.appendChild(el);
    });

    // Player marker
    const player = document.createElement('div');
    player.className = 'load-player';
    player.style.left = '4px';
    track.appendChild(player);

    const loadingText = document.getElementById('loading-text');
    const loadingPct = document.getElementById('loading-pct');

    function setLoadProgress(pct, msg) {
      pct = Math.min(100, Math.max(0, pct));
      if (loadingText) loadingText.textContent = msg;
      if (loadingPct) loadingPct.textContent = Math.round(pct) + '%';
      // Move player: 12 positions (0-11), each tile is 42px wide (40+2 gap)
      const tileWidth = 42;
      const maxPos = 11;
      const pos = Math.round((pct / 100) * maxPos);
      player.style.left = (pos * tileWidth + 4) + 'px';
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error('Failed: ' + src));
        document.head.appendChild(s);
      });
    }

    (async function boot() {
      try {
        setLoadProgress(5, '加载 Tailwind CSS...');
        await loadScript('https://cdn.tailwindcss.com');
        setLoadProgress(15, '加载 PixiJS...');
        await loadScript('https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js');
        setLoadProgress(20, '启动游戏...');
        await import('./src/main.js?v=1.8');
      } catch (e) {
        setLoadProgress(0, '加载失败: ' + e.message);
        console.error('Boot failed:', e);
      }
    })();
  </script>
</body>
</html>
