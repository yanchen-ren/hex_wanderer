<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>HexWanderer — 地图编辑器</title>
  <link rel="icon" type="image/png" href="assets/ui/logo.png">
  <style>
    /* === Reset & Base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #1a1a2e; color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px; line-height: 1.4;
    }

    /* === Loading Screen === */
    #editor-loading {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #1a1a2e;
      transition: opacity 0.3s ease;
    }
    #editor-loading.hidden { opacity: 0; pointer-events: none; }
    .editor-load-title {
      font-size: 20px; font-weight: bold; margin-bottom: 8px; letter-spacing: 2px;
    }
    .editor-load-subtitle {
      font-size: 13px; color: #888; margin-bottom: 24px;
    }
    .editor-load-spinner {
      width: 36px; height: 36px; border: 3px solid #333;
      border-top-color: #4fc3f7; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .editor-load-status { font-size: 12px; color: #888; }

    /* === Editor Layout === */
    .editor-layout {
      display: flex; flex-direction: column;
      width: 100%; height: 100vh;
    }

    /* === Toolbar (top) === */
    .editor-toolbar {
      display: flex; align-items: center; gap: 4px;
      padding: 6px 10px; background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0; overflow-x: auto;
      min-height: 44px; z-index: 10;
    }
    .editor-toolbar-title {
      font-size: 14px; font-weight: 600; margin-right: 8px;
      white-space: nowrap; color: #4fc3f7;
    }
    .editor-toolbar-sep {
      width: 1px; height: 24px; background: #0f3460;
      margin: 0 4px; flex-shrink: 0;
    }
    .editor-toolbar button {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 10px; min-width: 44px; min-height: 44px;
      background: #1a1a2e; color: #ccc; border: 1px solid #333;
      border-radius: 6px; cursor: pointer; font-size: 13px;
      white-space: nowrap; transition: background 0.15s, border-color 0.15s;
    }
    .editor-toolbar button:hover { background: #0f3460; border-color: #4fc3f7; color: #fff; }
    .editor-toolbar button:active { background: #0a1628; }
    .editor-toolbar button .btn-icon { font-size: 16px; line-height: 1; }
    .editor-toolbar button .btn-label { font-size: 12px; }

    /* === Main Content Area === */
    .editor-main {
      display: flex; flex: 1; min-height: 0;
    }

    /* === Tool Panel (left) === */
    .editor-tool-panel {
      width: 220px; flex-shrink: 0;
      background: #16213e; border-right: 1px solid #0f3460;
      overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .editor-tool-panel::-webkit-scrollbar { width: 4px; }
    .editor-tool-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* === Canvas Area (center) === */
    .editor-canvas-area {
      flex: 1; position: relative; min-width: 0;
      background: #111; overflow: hidden;
    }
    .editor-canvas-area canvas { display: block; }

    /* === Info Panel (right) === */
    .editor-info-panel {
      width: 220px; flex-shrink: 0;
      background: #16213e; border-left: 1px solid #0f3460;
      overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 8px;
      font-size: 12px;
    }
    .editor-info-panel::-webkit-scrollbar { width: 4px; }
    .editor-info-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* === Panel Section Headings === */
    .panel-section-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      color: #4fc3f7; letter-spacing: 1px; padding: 4px 0;
      border-bottom: 1px solid #0f3460; margin-bottom: 4px;
    }

    /* === Common Button Styles === */
    .editor-btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 44px; min-height: 44px;
      padding: 6px 10px; background: #1a1a2e; color: #ccc;
      border: 1px solid #333; border-radius: 6px;
      cursor: pointer; font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
    }
    .editor-btn:hover { background: #0f3460; border-color: #4fc3f7; color: #fff; }
    .editor-btn:active { background: #0a1628; }
    .editor-btn.active { background: #0f3460; border-color: #4fc3f7; color: #4fc3f7; }

    /* === Mobile Drawer Toggle === */
    .drawer-toggle {
      display: none; /* shown only on mobile */
      width: 100%; min-height: 44px; padding: 8px;
      background: #16213e; border: none; border-top: 1px solid #0f3460;
      color: #4fc3f7; font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: center;
    }
    .drawer-toggle .arrow { transition: transform 0.3s; display: inline-block; }
    .drawer-toggle .arrow.up { transform: rotate(180deg); }

    /* === Mobile Info Float Toggle === */
    .info-float-toggle {
      display: none; /* shown only on mobile */
      position: fixed; bottom: 56px; right: 8px; z-index: 25;
      width: 44px; height: 44px; border-radius: 50%;
      background: #16213e; border: 1px solid #0f3460;
      color: #4fc3f7; font-size: 18px; cursor: pointer;
      align-items: center; justify-content: center;
    }

    /* === Responsive: Mobile === */
    @media (max-width: 767px) {
      .editor-main {
        flex-direction: column; position: relative;
      }

      /* Canvas takes full space */
      .editor-canvas-area {
        width: 100%; height: 100%;
        flex: 1;
      }

      /* Tool panel becomes bottom drawer */
      .editor-tool-panel {
        position: fixed; bottom: 0; left: 0; right: 0;
        width: 100%; height: auto; max-height: 50vh;
        z-index: 20; border-right: none;
        border-top: 1px solid #0f3460;
        transform: translateY(calc(100% - 48px));
        transition: transform 0.3s ease;
        flex-direction: column;
      }
      .editor-tool-panel.expanded {
        transform: translateY(0);
      }
      .drawer-toggle { display: block; }

      /* Toolbar: icons only */
      .editor-toolbar button .btn-label { display: none; }
      .editor-toolbar button { padding: 6px; }
      .editor-toolbar-title { font-size: 12px; margin-right: 4px; }

      /* Info panel becomes floating card */
      .editor-info-panel {
        position: fixed; top: 52px; right: 8px;
        width: 200px; max-height: 40vh;
        z-index: 15; border-radius: 8px;
        border: 1px solid #0f3460;
        box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        display: none; /* toggled via JS */
      }
      .editor-info-panel.visible { display: flex; }
      .info-float-toggle { display: flex; }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="editor-loading">
    <div class="editor-load-title">HexWanderer</div>
    <div class="editor-load-subtitle">地图编辑器</div>
    <div class="editor-load-spinner"></div>
    <div id="editor-load-status" class="editor-load-status">加载中...</div>
  </div>

  <!-- Editor Layout -->
  <div class="editor-layout" id="editor-root" style="display:none;">
    <!-- Top Toolbar -->
    <div class="editor-toolbar" id="editor-toolbar">
      <span class="editor-toolbar-title">🗺️ 地图编辑器</span>
      <div class="editor-toolbar-sep"></div>
      <!-- Toolbar buttons will be populated by EditorUI -->
    </div>

    <!-- Main Content -->
    <div class="editor-main">
      <!-- Left Tool Panel -->
      <div class="editor-tool-panel" id="editor-tool-panel">
        <button class="drawer-toggle" id="drawer-toggle">
          <span class="arrow" id="drawer-arrow">▲</span> 工具面板
        </button>
        <!-- Tool panel content will be populated by EditorUI -->
      </div>

      <!-- Center Canvas -->
      <div class="editor-canvas-area" id="editor-canvas-area">
        <!-- PixiJS canvas will be inserted here -->
      </div>

      <!-- Right Info Panel -->
      <div class="editor-info-panel" id="editor-info-panel">
        <!-- Info panel content will be populated by EditorUI -->
      </div>
    </div>
  </div>

  <!-- Mobile info panel toggle -->
  <button class="info-float-toggle" id="info-float-toggle" title="信息面板">ℹ</button>

  <script>
    // Mobile drawer toggle
    const drawerToggle = document.getElementById('drawer-toggle');
    const toolPanel = document.getElementById('editor-tool-panel');
    const drawerArrow = document.getElementById('drawer-arrow');
    if (drawerToggle && toolPanel) {
      drawerToggle.addEventListener('click', () => {
        const expanded = toolPanel.classList.toggle('expanded');
        drawerArrow.classList.toggle('up', expanded);
      });
    }

    // Mobile info panel toggle
    const infoToggle = document.getElementById('info-float-toggle');
    const infoPanel = document.getElementById('editor-info-panel');
    if (infoToggle && infoPanel) {
      infoToggle.addEventListener('click', () => {
        infoPanel.classList.toggle('visible');
      });
    }
  </script>

  <!-- Load PixiJS (same version as game) -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>

  <script>
    const loadStatus = document.getElementById('editor-load-status');
    const loadingScreen = document.getElementById('editor-loading');
    const editorRoot = document.getElementById('editor-root');

    function setEditorLoadStatus(msg) {
      if (loadStatus) loadStatus.textContent = msg;
    }

    function hideLoading() {
      if (loadingScreen) loadingScreen.classList.add('hidden');
      if (editorRoot) editorRoot.style.display = '';
      setTimeout(() => { if (loadingScreen) loadingScreen.style.display = 'none'; }, 300);
    }

    (async function boot() {
      try {
        setEditorLoadStatus('加载 PixiJS...');
        // PixiJS is loaded via script tag above; verify it's available
        if (typeof PIXI === 'undefined') {
          throw new Error('PixiJS 加载失败');
        }
        setEditorLoadStatus('启动编辑器...');
        await import('./src/editor/EditorMain.js');
      } catch (e) {
        setEditorLoadStatus('加载失败: ' + e.message);
        console.error('Editor boot failed:', e);
      }
    })();
  </script>
</body>
</html>
